name: Desktop Release

on:
  push:
    tags: [ 'v*.*.*' ]
    paths:
      - 'swingmusic-desktop/**'
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Version Number (e.g., 1.0.0)'
        required: false
        type: string
        default: ''

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux-x64'
            os: ubuntu-latest
            architecture: 'x64'
            rust_target: 'x86_64-unknown-linux-gnu'
          - platform: 'win-x64'
            os: windows-latest
            architecture: 'x64'
            rust_target: 'x86_64-pc-windows-msvc'
          - platform: 'darwin-x64'
            os: macos-latest
            architecture: 'x64'
            rust_target: 'x86_64-apple-darwin'

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (ubuntu only)
      if: matrix.platform == 'linux-x64'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Rust setup
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.rust_target }}

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "swingmusic-desktop -> target"
        key: ${{ matrix.platform }}

    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli

    - name: Install desktop dependencies
      run: |
        cd swingmusic-desktop
        npm install

    - name: Build the app
      run: |
        cd swingmusic-desktop
        npm run tauri build -- --target ${{ matrix.rust_target }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: swingmusic-desktop-${{ matrix.platform }}
        path: |
          swingmusic-desktop/target/${{ matrix.rust_target }}/release/bundle/
          !swingmusic-desktop/target/${{ matrix.rust_target }}/release/bundle/.*/
        retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-release
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        find artifacts -name "*.msi" -exec cp {} release-assets/ \;
        find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
        find artifacts -name "*.AppImage" -exec cp {} release-assets/ \;
        find artifacts -name "*.deb" -exec cp {} release-assets/ \;
        find artifacts -name "*.rpm" -exec cp {} release-assets/ \;
        ls -la release-assets/
        
    - name: Extract version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        elif [ -n "${{ github.event.inputs.version_number }}" ]; then
          VERSION="${{ github.event.inputs.version_number }}"
        else
          VERSION="latest"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: Swing Music Desktop v${{ steps.version.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: release-assets/*
        body: |
          ## 🎵 Swing Music Desktop Application v${{ steps.version.outputs.version }}
          
          ### 📦 Installation
          
          #### Windows
          - Download the `.msi` installer
          - Run the installer and follow the setup wizard
          
          #### macOS  
          - Download the `.dmg` disk image
          - Open the file and drag Swing Music to Applications
          
          #### Linux
          - **AppImage**: Download and make executable: `chmod +x SwingMusic.AppImage`
          - **DEB/Ubuntu**: Download `.deb` and install: `sudo dpkg -i swingmusic_*.deb`
          
          ### ✨ What's New
          - Cross-platform desktop application
          - Native performance and integration
          - Spotify URL downloader integration
          - Local library management
          - Modern, responsive UI
          - Auto-updates (Windows/macOS)
          
          ### 🔧 System Requirements
          - **Windows**: Windows 10 or later
          - **macOS**: macOS 10.15 or later  
          - **Linux**: Modern distributions with GTK3
          
          ---
          🚀 **Thank you for using Swing Music Desktop!**
          
          ### 🔗 Links
          - **GitHub Repository**: ${{ github.repository }}
          - **Issues**: ${{ github.server_url }}/${{ github.repository }}/issues
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
