name: Swing Music Desktop CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Version Number (e.g., 1.0.0)'
        required: false
        type: string
        default: ''
      create_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies (ubuntu)
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
    
    - name: Rust setup
      uses: dtolnay/rust-toolchain@stable
    
    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./src-tauri -> target"
        
    - name: Run tests
      run: cargo test

  build:
    name: Build on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: test
    if: always()
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux-x64'
            os: ubuntu-latest
            architecture: 'x64'
            rust_target: 'x86_64-unknown-linux-gnu'
          - platform: 'win-x64'
            os: windows-latest
            architecture: 'x64'
            rust_target: 'x86_64-pc-windows-msvc'
          - platform: 'darwin-x64'
            os: macos-latest
            architecture: 'x64'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'darwin-arm64'
            os: macos-14
            architecture: 'arm64'
            rust_target: 'aarch64-apple-darwin'

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (ubuntu only)
      if: matrix.platform == 'linux-x64'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Rust setup
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.rust_target }}

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./src-tauri -> target"
        key: ${{ matrix.platform }}

    - name: Sync node version and setup cache
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Build the app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: ${{ github.ref_name }}
        releaseName: 'Swing Music Desktop v__VERSION__'
        releaseBody: |
          ## 🎵 Swing Music Desktop Application
          
          ### ✨ Features
          - **Cross-platform desktop app** built with Tauri
          - **Native performance** with web-based UI
          - **Spotify integration** for music discovery
          - **Local library management** with metadata support
          - **Modern interface** matching web and mobile apps
          
          ### 📦 Installation
          - **Windows**: Download `.msi` installer
          - **macOS**: Download `.dmg` disk image
          - **Linux**: Download `.AppImage` or `.deb` package
          
          ### 🔧 Technical Details
          - Built with **Tauri** for lightweight, secure desktop apps
          - **Rust** backend for performance and safety
          - **Web frontend** for consistent UI across platforms
          - **Auto-updates** included (Windows/macOS)
          
          ---
          📲 **Download the appropriate installer for your platform below!**
        releaseDraft: true
        prerelease: false
        includeDebug: false
        includeRelease: true
        args: |
          --target ${{ matrix.rust_target }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: swingmusic-desktop-${{ matrix.platform }}
        path: |
          src-tauri/target/${{ matrix.rust_target }}/release/bundle/
          !src-tauri/target/${{ matrix.rust_target }}/release/bundle/.*/
        retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.create_release == 'true' ||
      startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        find artifacts -name "*.msi" -exec cp {} release-assets/ \;
        find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
        find artifacts -name "*.AppImage" -exec cp {} release-assets/ \;
        find artifacts -name "*.deb" -exec cp {} release-assets/ \;
        find artifacts -name "*.rpm" -exec cp {} release-assets/ \;
        ls -la release-assets/
        
    - name: Extract version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        elif [ -n "${{ github.event.inputs.version_number }}" ]; then
          VERSION="${{ github.event.inputs.version_number }}"
        else
          VERSION="latest"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: Swing Music Desktop v${{ steps.version.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: release-assets/*
        body: |
          ## 🎵 Swing Music Desktop Application v${{ steps.version.outputs.version }}
          
          ### 📦 Installation
          
          #### Windows
          - Download the `.msi` installer
          - Run the installer and follow the setup wizard
          
          #### macOS  
          - Download the `.dmg` disk image
          - Open the file and drag Swing Music to Applications
          
          #### Linux
          - **AppImage**: Download and make executable: `chmod +x SwingMusic.AppImage`
          - **DEB/Ubuntu**: Download `.deb` and install: `sudo dpkg -i swingmusic_*.deb`
          
          ### ✨ What's New
          - Cross-platform desktop application
          - Native performance and integration
          - Spotify URL downloader integration
          - Local library management
          - Modern, responsive UI
          - Auto-updates (Windows/macOS)
          
          ### 🔧 System Requirements
          - **Windows**: Windows 10 or later
          - **macOS**: macOS 10.15 or later  
          - **Linux**: Modern distributions with GTK3
          
          ---
          🚀 **Thank you for using Swing Music Desktop!**
          
          ### 🔗 Links
          - **GitHub Repository**: ${{ github.repository }}
          - **Issues**: ${{ github.server_url }}/${{ github.repository }}/issues
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
